name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  linux:
    name: PHP ${{ matrix.php }} (Linux)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.0', '8.1', '8.2', '8.3', '8.4', '8.5']
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      - name: Build
        run: |
          phpize
          ./configure --enable-sentry
          make

      - name: Test
        run: make test TESTS="--show-diff" NO_INTERACTION=1

  windows:
    name: PHP ${{ matrix.php-version }} (${{ matrix.arch }}, ${{ matrix.ts == '' && 'nts' || 'ts' }}) (Windows)
    needs: get-windows-matrix
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.get-windows-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: php/php-windows-builder/extension@v1
        with:
          php-version: ${{ matrix.php-version }}
          arch: ${{ matrix.arch }}
          ts: ${{ matrix.ts }}

  get-windows-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - id: matrix
        uses: php/php-windows-builder/extension-matrix@v1
        with:
          php-version-list: '8.0, 8.1, 8.2, 8.3, 8.4'
